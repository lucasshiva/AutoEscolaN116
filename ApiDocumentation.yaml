---
openapi: 3.1.0
info:
  title: Auto Escola N116
  description: API de back-end da Auto Escola N-116
  contact:
    name: lucasshiva
    email: silva.lucasdev@gmail.com
  license:
    name: Apache 2.0
    url: https://autoescolan116.com/api/license
servers:
  - url: http://localhost:8080
    description: Generated server url
paths:
  "/students/{id}":
    get:
      tags:
        - students-controller
      operationId: findById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/GetStudentByIdResponse"
      security:
        - bearer-key: [ ]
    put:
      tags:
        - students-controller
      operationId: update
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/UpdateStudentRequest"
        required: true
      responses:
        '200':
          description: OK
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/UpdateStudentResponse"
      security:
        - bearer-key: [ ]
    delete:
      tags:
        - students-controller
      operationId: softDelete
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
      security:
        - bearer-key: [ ]
  "/instructors/{id}":
    get:
      tags:
        - instructors-controller
      operationId: getById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/GetInstructorByIdResponse"
      security:
        - bearer-key: [ ]
    put:
      tags:
        - instructors-controller
      operationId: update_1
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/UpdateInstructorRequest"
        required: true
      responses:
        '200':
          description: OK
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/UpdateInstructorResponse"
      security:
        - bearer-key: [ ]
    delete:
      tags:
        - instructors-controller
      operationId: deleteById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
      security:
        - bearer-key: [ ]
  "/students":
    get:
      tags:
        - students-controller
      operationId: findAll
      parameters:
        - name: page
          in: query
          description: One-based page index (1..N)
          required: false
          schema:
            type: integer
            default: 1
            minimum: 0
        - name: size
          in: query
          description: The size of the page to be returned
          required: false
          schema:
            type: integer
            default: 10
            minimum: 1
        - name: sort
          in: query
          description: 'Sorting criteria in the format: property,(asc|desc). Default
          sort order is ascending. Multiple sort criteria are supported.'
          required: false
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: OK
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/ListStudentsResponse"
      security:
        - bearer-key: [ ]
    post:
      tags:
        - students-controller
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateStudentRequest"
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/CreateStudentResponse"
      security:
        - bearer-key: [ ]
  "/lessons":
    post:
      tags:
        - lessons-controller
      operationId: schedule
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/ScheduleLessonRequest"
        required: true
      responses:
        '200':
          description: OK
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/ScheduleLessonResponse"
      security:
        - bearer-key: [ ]
  "/instructors":
    get:
      tags:
        - instructors-controller
      operationId: findAll_1
      parameters:
        - name: page
          in: query
          description: One-based page index (1..N)
          required: false
          schema:
            type: integer
            default: 1
            minimum: 0
        - name: size
          in: query
          description: The size of the page to be returned
          required: false
          schema:
            type: integer
            default: 10
            minimum: 1
        - name: sort
          in: query
          description: 'Sorting criteria in the format: property,(asc|desc). Default
          sort order is ascending. Multiple sort criteria are supported.'
          required: false
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: OK
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/ListInstructorsResponse"
      security:
        - bearer-key: [ ]
    post:
      tags:
        - instructors-controller
      operationId: createNew
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateInstructorRequest"
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/CreateInstructorResponse"
      security:
        - bearer-key: [ ]
  "/auth/register":
    post:
      tags:
        - auth-controller
      operationId: register
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/AuthRegisterRequest"
        required: true
      responses:
        '200':
          description: OK
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/AuthRegisterResponse"
  "/auth/login":
    post:
      tags:
        - auth-controller
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/AuthLoginRequest"
        required: true
      responses:
        '200':
          description: OK
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/AuthLoginResponse"
components:
  schemas:
    Address:
      type: object
      properties:
        logradouro:
          type: string
          minLength: 1
        numero:
          type: string
          pattern: "\\d+"
        complemento:
          type: string
        cidade:
          type: string
          minLength: 1
        cep:
          type: string
          pattern: "\\d{8}"
        uf:
          type: string
          pattern: "[A-Z]{2}"
      required:
        - cidade
        - logradouro
    UpdateStudentRequest:
      type: object
      properties:
        nome:
          type: string
          minLength: 1
        telefone:
          type: string
          minLength: 1
        endereco:
          "$ref": "#/components/schemas/Address"
      required:
        - endereco
        - nome
        - telefone
    UpdateStudentResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        nome:
          type: string
        email:
          type: string
        telefone:
          type: string
        cpf:
          type: string
        endereco:
          "$ref": "#/components/schemas/Address"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    UpdateInstructorRequest:
      type: object
      properties:
        nome:
          type: string
          minLength: 1
        telefone:
          type: string
          minLength: 1
        endereco:
          "$ref": "#/components/schemas/Address"
      required:
        - endereco
        - nome
        - telefone
    UpdateInstructorResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        nome:
          type: string
        email:
          type: string
        telefone:
          type: string
        cnh:
          type: string
        endereco:
          "$ref": "#/components/schemas/Address"
        especialidade:
          type: string
          enum:
            - MOTOS
            - CARROS
            - VANS
            - CAMINHOES
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateStudentRequest:
      type: object
      properties:
        nome:
          type: string
          minLength: 1
        email:
          type: string
          format: email
          minLength: 1
        telefone:
          type: string
        cpf:
          type: string
        endereco:
          "$ref": "#/components/schemas/Address"
      required:
        - email
        - endereco
        - nome
    CreateStudentResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time
      required:
        - createdAt
    ScheduleLessonRequest:
      type: object
      properties:
        studentId:
          type: integer
          format: int64
        instructorId:
          type: integer
          format: int64
        category:
          type: string
          enum:
            - MOTOS
            - CARROS
            - VANS
            - CAMINHOES
        date:
          type: string
          format: date
        time:
          type: string
      required:
        - category
        - date
        - studentId
        - time
    ScheduleLessonResponse:
      type: object
      properties:
        lessonId:
          type: integer
          format: int64
        studentId:
          type: integer
          format: int64
        instructorId:
          type: integer
          format: int64
        category:
          type: string
          enum:
            - MOTOS
            - CARROS
            - VANS
            - CAMINHOES
        date:
          type: string
          format: date
        hourStart:
          type: string
        hourEnd:
          type: string
    CreateInstructorRequest:
      type: object
      properties:
        nome:
          type: string
          minLength: 1
        email:
          type: string
          format: email
          minLength: 1
        telefone:
          type: string
        cnh:
          type: string
        especialidade:
          type: string
          enum:
            - MOTOS
            - CARROS
            - VANS
            - CAMINHOES
        endereco:
          "$ref": "#/components/schemas/Address"
      required:
        - email
        - endereco
        - especialidade
        - nome
    CreateInstructorResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        nome:
          type: string
        createdAt:
          type: string
          format: date-time
    AuthRegisterRequest:
      type: object
      properties:
        login:
          type: string
          minLength: 1
        senha:
          type: string
          minLength: 1
      required:
        - login
        - senha
    AuthRegisterResponse:
      type: object
      properties:
        token:
          type: string
    AuthLoginRequest:
      type: object
      properties:
        login:
          type: string
          minLength: 1
        senha:
          type: string
          minLength: 1
      required:
        - login
        - senha
    AuthLoginResponse:
      type: object
      properties:
        token:
          type: string
    ListStudentDTO:
      type: object
      properties:
        nome:
          type: string
        email:
          type: string
        cpf:
          type: string
    ListStudentsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            "$ref": "#/components/schemas/ListStudentDTO"
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
    GetStudentByIdResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        nome:
          type: string
        email:
          type: string
        telefone:
          type: string
        endereco:
          "$ref": "#/components/schemas/Address"
        cpf:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ListInstructorDTO:
      type: object
      properties:
        nome:
          type: string
        email:
          type: string
        cnh:
          type: string
        especialidade:
          type: string
          enum:
            - MOTOS
            - CARROS
            - VANS
            - CAMINHOES
    ListInstructorsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            "$ref": "#/components/schemas/ListInstructorDTO"
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
    GetInstructorByIdResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        nome:
          type: string
        email:
          type: string
        telefone:
          type: string
        cnh:
          type: string
        especialidade:
          type: string
          enum:
            - MOTOS
            - CARROS
            - VANS
            - CAMINHOES
        endereco:
          "$ref": "#/components/schemas/Address"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
  securitySchemes:
    bearer-key:
      type: http
      scheme: bearer
      bearerFormat: JWT
